<!-- navbar.component.html -->
<header class="navbar-header">
  <nav class="navbar" [ngClass]="userRole">
    <div class="navbar-logo">
      <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" alt="EduPro" height="28" />
      <span class="navbar-title">EduPro</span>
    </div>
    
    <!-- Botón hamburguesa para móvil -->
    <button class="menu-toggle" (click)="toggleMenu()" [class.active]="menuOpen">
      <span class="hamburger"></span>
    </button>
    
    <div class="navbar-links" [class.open]="menuOpen">
      <ng-container *ngIf="!isAuthenticated">
        <a routerLink="/" (click)="closeMenu()">Inicio</a>
        <a routerLink="/login" (click)="closeMenu()">Ingresar</a>
        <a routerLink="/register" (click)="closeMenu()">Registrarse</a>
      </ng-container>
      <ng-container *ngIf="isAuthenticated && userRole === 'admin'">
        <a routerLink="/admin/dashboard" (click)="closeMenu()">Dashboard</a>
        <a routerLink="/admin/users" (click)="closeMenu()">Usuarios</a>
        <a routerLink="/admin/course-review" (click)="closeMenu()">Revisar Cursos</a>
        <a routerLink="/admin/report" (click)="closeMenu()">Reportes</a>
        <a (click)="logout()">Salir</a>
      </ng-container>
      <ng-container *ngIf="isAuthenticated && userRole === 'instructor'">
        <a routerLink="/instructor/dashboard" (click)="closeMenu()">Dashboard</a>
        <a routerLink="/instructor/create-course" (click)="closeMenu()">Crear Curso</a>
        <a routerLink="/instructor/manage-course" (click)="closeMenu()">Gestionar Curso</a>
        <a routerLink="/profile" (click)="closeMenu()">Perfil</a>
        <a (click)="logout()">Salir</a>
      </ng-container>
      <ng-container *ngIf="isAuthenticated && userRole === 'student'">
        <a routerLink="/student/dashboard" (click)="closeMenu()">Dashboard</a>
        <a routerLink="/student/my-course" (click)="closeMenu()">Mis Cursos</a>
        <a routerLink="/student/inscripcion" (click)="closeMenu()">Inscripción</a>
        <a routerLink="/profile" (click)="closeMenu()">Perfil</a>
        <a (click)="logout()">Salir</a>
      </ng-container>
    </div>
  </nav>
</header>
