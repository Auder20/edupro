<!-- FORMULARIO DE LOGIN -->
<div class="login-box">
  <h1>🎒 ¡Bienvenido!</h1>
  <p>Inicia sesión en tu cuenta escolar</p>
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="input-group" [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
      <span>📧</span>
      <input type="email" formControlName="email" placeholder="Correo electrónico" required />
    </div>
    <div class="input-group" [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
      <span>🔒</span>
      <input type="password" formControlName="password" placeholder="Contraseña" required />
    </div>
    <button type="submit" [disabled]="loading">{{ loading ? 'Cargando...' : '🚀 Iniciar Sesión' }}</button>
    <div *ngIf="error" class="error-message">{{ error }}</div>
  </form>
  <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>

  <p>¿Aún no tienes una cuenta? <a routerLink="/register">Regístrate</a></p>
</div>
