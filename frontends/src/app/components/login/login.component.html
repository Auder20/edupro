<div class="login-container">
  <!-- FORMULARIO DE LOGIN -->
  <div class="login-box">
    <div class="logo">
      <h1>EduPro</h1>
    </div>
    <h2>Iniciar Sesión</h2>
    <p>Accede a tu cuenta para continuar</p>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="input-group" [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
        <label for="email">Correo Electrónico</label>
        <input id="email" type="email" formControlName="email" placeholder="tu@email.com" required />
      </div>
      <div class="input-group" [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" placeholder="••••••••" required />
      </div>
      <button type="submit" [disabled]="loading" class="login-button">{{ loading ? 'Cargando...' : 'Iniciar sesión' }}</button>
      <div *ngIf="error" class="error-message">{{ error }}</div>
    </form>
    <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>

    <p class="signup-link">¿Aún no tienes una cuenta? <a routerLink="/register">Regístrate</a></p>
  </div>
</div>
