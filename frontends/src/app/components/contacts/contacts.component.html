<main>
  <header>
    <h1>EduPro</h1>
    <p>Ensenanza y aprendizaje, desde cualquier lugar, en cualquier momento</p>
  </header>

  <app-navbar></app-navbar>

  <section class="bienvenida">
    <h2>Contáctanos</h2>

      <button type="submit">Enviar ✉️</button>
    </form>
  </section>

  <app-footer></app-footer>
</main>
