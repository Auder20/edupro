<form class="register-form" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
  <div>
    <label for="name">Nombre:</label>
    <input type="text" id="name" formControlName="name" required>
  </div>
  <div>
    <label for="email">Correo electrónico:</label>
    <input type="email" id="email" formControlName="email" required>
  </div>
  <div>
    <label for="password">Contraseña:</label>
    <input type="password" id="password" formControlName="password" required>
  </div>
  <div>
    <label for="confirmPassword">Confirmar contraseña:</label>
    <input type="password" id="confirmPassword" formControlName="confirmPassword" required>
  </div>
  <div>
    <label for="role">Rol:</label>
    <select id="role" formControlName="role" required>
      <option value="" disabled selected>Seleccione un rol</option>
      <option value="student">Estudiante</option>
      <option value="instructor">Instructor</option>
      <option value="admin">Admin</option>
    </select>
  </div>
  <button class="register-btn" type="submit">Registrarse</button>
  <div *ngIf="error" class="error">{{ error }}</div>
  <div *ngIf="success" class="success">{{ success }}</div>
</form>
