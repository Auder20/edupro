<div class="course-review-page">
  <h1 class="course-review-title">Revisión de Cursos <span style="font-size:1.3rem;">📋</span></h1>
  <div class="search-bar">
    <input class="search-input" type="text" placeholder="Buscar curso..." [(ngModel)]="searchTerm"
      (ngModelChange)="searchCourse()" />
    <button class="search-btn" (click)="searchCourse()">Buscar</button>
  </div>
  <table class="course-table">
    <thead>
      <tr>
        <th>Nombre del Curso</th>
        <th>Instructor</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngIf="filteredCourses.length === 0">
        <td colspan="4" style="text-align:center; color:#888;">No se encontraron cursos.</td>
      </tr>
      <tr *ngFor="let c of filteredCourses">
        <td>{{ c.title || c.name || 'Curso Sin Título' }}</td>
        <td>{{ c.Instructor?.name || 'Varios/No Asignado' }}</td>
        <td>
          <span class="status-badge"
            [ngClass]="{'status-pending': c.status === 'draft', 'status-published': c.status === 'published'}">
            {{ c.status === 'draft' ? 'Pendiente' : (c.status === 'published' ? 'Publicado' : c.status) }}
          </span>
        </td>
        <td>
          <button class="approve-btn" *ngIf="c.status !== 'published'"
            (click)="updateStatus(c.id, 'published')">Aprobar</button>
          <button class="reject-btn" *ngIf="c.status !== 'archived'"
            (click)="updateStatus(c.id, 'archived')">Rechazar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
