<div class="report-page">
  <h1 class="report-title">Reporte de Administración <span style="font-size:1.3rem;">📊</span></h1>

  <section class="report-section report-filters">
    <h2 class="section-title">Filtros</h2>
    <form class="report-form" (submit)="generarReporte($event)">
      <label for="date-from">Desde:
        <input type="date" id="date-from" name="date-from" [(ngModel)]="dateFrom">
      </label>
      <label for="date-to">Hasta:
        <input type="date" id="date-to" name="date-to" [(ngModel)]="dateTo">
      </label>
      <button class="report-btn" type="submit">Generar Reporte</button>
    </form>
  </section>

  <section class="report-section report-results">
    <h2 class="section-title">Resultados</h2>
    <table class="report-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre (Usuario)</th>
          <th>Fecha de Registro</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngIf="filteredReports.length === 0">
          <td colspan="4" style="text-align:center; color:#888;">No hay resultados con estos filtros.</td>
        </tr>
        <tr *ngFor="let item of filteredReports">
          <td>{{ item.id }}</td>
          <td>{{ item.name }}</td>
          <td>{{ (item.created_at || item.createdAt) | date:'yyyy-MM-dd' }}</td>
          <td>{{ item.status || 'Completado' }}</td>
        </tr>
      </tbody>
    </table>
  </section>
</div>
