<div class="users-page">
  <h1 class="users-title">Gestión de Usuarios <span style="font-size:1.3rem;">👥</span></h1>
  <div class="users-actions">
    <a class="users-add-btn" routerLink="/admin/users/new">Agregar Usuario</a>
  </div>
  <table class="users-table">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Email</th>
        <th>Rol</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users">
        <td>{{user.name}}</td>
        <td>{{user.email}}</td>
        <td>{{user.role}}</td>
        <td>
          <button class="users-edit-btn" (click)="editUser(user)">✏️</button>
          <button class="users-delete-btn" (click)="deleteUser(user)">🗑️</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
