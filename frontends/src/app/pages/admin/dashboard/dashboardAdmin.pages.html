<!-- dashboardAdmin.pages.html -->

<div class="dashboard-admin">
  <h1 class="dashboard-title">Panel de Administración <span style="font-size:1.5rem;">🛠️</span></h1>

  <section class="dashboard-section stats">
    <h2 class="section-title">Estadísticas Rápidas</h2>
    <div class="stats-cards">
      <div class="stats-card">
        <h3>Usuarios</h3>
        <p>{{ stats.users }}</p>
      </div>
      <div class="stats-card">
        <h3>Cursos</h3>
        <p>{{ stats.courses }}</p>
      </div>
      <div class="stats-card">
        <h3>Inscripciones</h3>
        <p>{{ stats.enrollments }}</p>
      </div>
    </div>
  </section>

  <section class="dashboard-section actions">
    <h2 class="section-title">Acciones Rápidas</h2>
    <div class="actions-btns">
      <a class="dashboard-btn" routerLink="/admin/users">Agregar Usuario</a>
      <a class="dashboard-btn" routerLink="/instructor/create-course">Crear Curso</a>
      <a class="dashboard-btn" routerLink="/admin/report">Ver Reportes</a>
    </div>
  </section>

  <section class="dashboard-section recent-activity">
    <h2 class="section-title">Actividad Reciente</h2>
    <ul class="activity-list">
      <li *ngIf="recentActivity.length === 0">No hay actividad reciente registrada.</li>
      <li *ngFor="let activity of recentActivity">{{ activity }}</li>
    </ul>
  </section>
</div>
