<!-- Inscripción de Estudiante - Profesional y Neutro -->
<div class="inscripcion-container">
  <h1 class="inscripcion-title">Inscripción de Estudiante</h1>
  <form class="inscripcion-form" (submit)="submitEnrollment(); $event.preventDefault()">
    <div class="form-group">
      <label for="nombre">Nombre completo</label>
      <input type="text" id="nombre" name="nombre" [(ngModel)]="studentData.name" readonly required>
    </div>
    <div class="form-group">
      <label for="correo">Correo electrónico</label>
      <input type="email" id="correo" name="correo" [(ngModel)]="studentData.email" readonly required>
    </div>
    <div class="form-group">
      <label for="curso">Curso a inscribirse</label>
      <select id="curso" name="curso" [(ngModel)]="selectedCourseId" required>
        <option value="">Seleccione un curso</option>
        <option *ngFor="let c of courses" [value]="c.id">{{ c.title || c.name }}</option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary" [disabled]="!selectedCourseId">Inscribirse</button>
  </form>
</div>
