<div class="quiz-page">
  <h1>Quiz para Estudiantes</h1>
  <div *ngIf="!quizStarted">
    <button (click)="startQuiz()">Comenzar Quiz</button>
  </div>

  <div *ngIf="quizStarted && !quizFinished">
    <div class="question-section">
      <h2>Pregunta {{currentQuestionIndex + 1}} de {{questions.length}}</h2>
      <p>{{questions[currentQuestionIndex].texto}}</p>
      <ul>
        <li *ngFor="let opcion of questions[currentQuestionIndex].opciones">
          <label>
            <input type="radio" name="respuesta" [value]="opcion" (change)="selectOption(opcion)">
            {{opcion}}
          </label>
        </li>
      </ul>
    </div>
    <button (click)="nextQuestion()" [disabled]="!selectedOption">Siguiente</button>
  </div>

  <div *ngIf="quizFinished">
    <h2>¡Quiz finalizado!</h2>
    <p>Tu puntaje: {{score}} / {{questions.length}}</p>
    <button (click)="restartQuiz()">Reintentar</button>
  </div>
</div>
