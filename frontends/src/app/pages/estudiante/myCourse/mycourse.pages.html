<div class="mycourse-container">
  <h1 class="mycourse-title">Mis Cursos</h1>
  <div *ngIf="courses && courses.length; else noCourses">
    <div class="mycourse-list">
      <div class="mycourse-card" *ngFor="let course of courses">
        <h2 class="mycourse-card-title">{{ course.title }}</h2>
        <p class="mycourse-card-description">{{ course.description }}</p>
        <div class="mycourse-card-actions">
          <a class="mycourse-btn" [routerLink]="['/curso', course.id]">Ver detalles</a>
        </div>
      </div>
    </div>
  </div>
  <ng-template #noCourses>
    <p style="color:#888; text-align:center;">No estás inscrito en ningún curso.</p>
  </ng-template>
</div>
