<div class="my-courses-container">
  <h2>Mis Cursos</h2>
  <div *ngIf="courses && courses.length; else noCourses">
    <ul>
      <li *ngFor="let course of courses">
        <h3>{{ course.title }}</h3>
        <p>{{ course.description }}</p>
        <button [routerLink]="['/curso', course.id]">Ver detalles</button>
      </li>
    </ul>
  </div>
  <ng-template #noCourses>
    <p>No estás inscrito en ningún curso.</p>
  </ng-template>
</div>
