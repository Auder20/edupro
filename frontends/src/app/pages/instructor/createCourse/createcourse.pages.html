<div class="create-course-container">
  <h1>Crear Nuevo Curso</h1>
  <form>
    <div class="form-group">
      <label for="courseTitle">Título del Curso</label>
      <input type="text" id="courseTitle" name="courseTitle" class="form-control" required>
    </div>
    <div class="form-group">
      <label for="courseDescription">Descripción</label>
      <textarea id="courseDescription" name="courseDescription" class="form-control" rows="4" required></textarea>
    </div>
    <div class="form-group">
      <label for="courseCategory">Categoría</label>
      <select id="courseCategory" name="courseCategory" class="form-control" required>
        <option value="">Seleccione una categoría</option>
        <option value="programacion">Programación</option>
        <option value="matematicas">Matemáticas</option>
        <option value="idiomas">Idiomas</option>
        <option value="arte">Arte</option>
      </select>
    </div>
    <div class="form-group">
      <label for="courseImage">Imagen del Curso</label>
      <input type="file" id="courseImage" name="courseImage" class="form-control">
    </div>
    <button type="submit" class="btn btn-primary">Crear Curso</button>
  </form>
</div>
