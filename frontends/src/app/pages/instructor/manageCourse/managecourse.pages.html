<!-- Gestionar Curso - Profesional y Neutro -->
<div class="manage-course-container">
  <header class="manage-course-header">
    <h1 class="manage-course-title">Gestionar Curso</h1>
  </header>

  <section class="course-details">
    <h2>Detalles del Curso</h2>
    <form class="manage-course-form">
      <div class="form-group">
        <label for="course-title">Título del Curso:</label>
        <input id="course-title" name="course-title" type="text" placeholder="Ingrese el título del curso" />
      </div>
      <div class="form-group">
        <label for="course-description">Descripción:</label>
        <textarea id="course-description" name="course-description" placeholder="Ingrese la descripción"></textarea>
      </div>
      <div class="form-group">
        <label for="course-category">Categoría:</label>
        <select id="course-category" name="course-category">
          <option value="">Seleccione una categoría</option>
          <option value="programacion">Programación</option>
          <option value="matematicas">Matemáticas</option>
          <option value="idiomas">Idiomas</option>
        </select>
      </div>
      <button type="submit">Guardar Cambios</button>
    </form>
  </section>

  <section class="course-content">
    <h2>Contenido del Curso</h2>
    <button type="button" class="btn-add">Agregar Módulo</button>
    <ul class="module-list">
      <li>Módulo 1: Introducción</li>
      <li>Módulo 2: Conceptos Básicos</li>
      <!-- Más módulos aquí -->
    </ul>
  </section>

  <section class="course-students">
    <h2>Estudiantes Inscritos</h2>
    <ul class="student-list">
      <li>Juan Pérez</li>
      <li>María López</li>
      <!-- Más estudiantes aquí -->
    </ul>
  </section>
</div>
