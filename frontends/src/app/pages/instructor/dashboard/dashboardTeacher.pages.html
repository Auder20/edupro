<!-- Dashboard del Instructor - Profesional y Neutro -->
<div class="dashboard-container">
  <header class="dashboard-header">
    <h1>Panel de Instructor</h1>
    <p class="dashboard-subtitle">Bienvenido a tu espacio de gestión educativa</p>
  </header>

  <section class="dashboard-cards">
    <div class="dashboard-card">
      <span class="dashboard-card-title">Cursos</span>
      <span class="dashboard-card-value">0</span>
    </div>
    <div class="dashboard-card">
      <span class="dashboard-card-title">Estudiantes</span>
      <span class="dashboard-card-value">0</span>
    </div>
    <div class="dashboard-card">
      <span class="dashboard-card-title">Ingresos</span>
      <span class="dashboard-card-value">$0</span>
    </div>
  </section>

  <section class="dashboard-section">
    <h2 class="dashboard-section-title">Cursos Recientes</h2>
    <div class="dashboard-table-wrapper">
      <table class="dashboard-table">
        <thead>
          <tr>
            <th>Curso</th>
            <th>Fecha</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="3" style="text-align:center; color:#888;">No hay cursos recientes.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <section class="dashboard-section">
    <h2 class="dashboard-section-title">Acciones Rápidas</h2>
    <div class="actions-btns">
      <a class="dashboard-btn" routerLink="/instructor/create-course">Crear Nuevo Curso</a>
      <a class="dashboard-btn" routerLink="/instructor/manage-course">Gestionar Cursos</a>
    </div>
  </section>
</div>
